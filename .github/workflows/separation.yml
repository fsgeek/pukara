name: Builder/Tester Separation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-separation:
    name: Verify builder/tester separation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check no commit mixes src/ and tests/
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_AFTER_SHA: ${{ github.event.after }}
        run: |
          FAILED=0

          # Amnesty point: commits at or before this SHA are not checked.
          # Pre-separation history and committed transgressions live before
          # here. Advance this SHA after a release to keep the walk window
          # small. Must exist on main.
          AMNESTY="bf62c6292e6b4542f5a38acecf34d20e6be987ac"

          if ! git rev-parse --verify "$AMNESTY^{commit}" >/dev/null 2>&1; then
            echo "::error::Amnesty SHA $AMNESTY does not resolve — fix .github/workflows/separation.yml"
            exit 1
          fi

          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE="$PR_BASE_SHA"
            HEAD="$PR_HEAD_SHA"
          else
            BASE="$PUSH_BEFORE_SHA"
            HEAD="$PUSH_AFTER_SHA"
          fi

          if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "Initial push — skipping separation check."
            exit 0
          fi

          # If BASE is at or before AMNESTY, advance it forward so the walk
          # only covers post-amnesty commits.
          if git merge-base --is-ancestor "$BASE" "$AMNESTY"; then
            echo "BASE ($BASE) is at or before amnesty point — walking from $AMNESTY instead."
            BASE="$AMNESTY"
          fi

          for COMMIT in $(git rev-list "$BASE".."$HEAD"); do
            AUTHOR=$(git log -1 --format='%ae' "$COMMIT")
            FILES=$(git diff-tree --no-commit-id --name-only -r "$COMMIT")

            TOUCHES_SRC=$(echo "$FILES" | grep -c '^src/' || true)
            TOUCHES_TESTS=$(echo "$FILES" | grep -c '^tests/' || true)

            if [ "$TOUCHES_SRC" -gt 0 ] && [ "$TOUCHES_TESTS" -gt 0 ]; then
              SHORT=$(git rev-parse --short "$COMMIT")
              echo "::error::Commit $SHORT ($AUTHOR) modifies both src/ and tests/ — violates builder/tester separation"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Builder/tester separation requires that code and tests be authored"
            echo "in separate commits by different agents."
            exit 1
          fi

          echo "All commits respect builder/tester separation."

  tests:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pukara
        uses: actions/checkout@v4
        with:
          path: pukara

      - name: Checkout yanantin (path dependency)
        uses: actions/checkout@v4
        with:
          repository: fsgeek/yanantin
          path: yanantin

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        working-directory: pukara
        run: uv sync --extra dev

      - name: Run tests
        working-directory: pukara
        run: uv run pytest tests/ -v
